name: Electron Release

# 本机 npm run pub 创建 GitHub Release（含安装包）后触发，通知官网更新下载链接。
on:
  release:
    types: [published]

permissions:
  contents: read

env:
  SITE_REPO: visual-e2e/visual-e2e-sky

jobs:
  notify-site:
    name: Trigger download site
    runs-on: ubuntu-latest
    steps:
      - name: Trigger site redeploy
        env:
          SITE_DEPLOY_TOKEN: ${{ secrets.SITE_DEPLOY_TOKEN }}
        run: |
          if [ -z "$SITE_DEPLOY_TOKEN" ]; then
            echo "::warning::SITE_DEPLOY_TOKEN not set — visual-e2e-sky deploy was not triggered."
            echo "Create a PAT with repo scope on visual-e2e/visual-e2e-sky and add it as SITE_DEPLOY_TOKEN."
            exit 0
          fi
          VERSION="${{ github.event.release.tag_name }}"
          # CDN_BASE: 七牛自定义域名，例如 https://download.example.com（无尾斜杠）
          # 下载站用 {CDN_BASE}/releases/{VERSION}/manifest.json；也可在 payload 里覆盖 manifestUrl
          CDN_BASE="${{ vars.CDN_BASE }}"
          if [ -z "$CDN_BASE" ]; then
            CDN_BASE="${{ secrets.CDN_BASE }}"
          fi
          MANIFEST_URL=""
          if [ -n "$CDN_BASE" ]; then
            CDN_BASE="${CDN_BASE%/}"
            MANIFEST_URL="${CDN_BASE}/releases/${VERSION}/manifest.json"
          fi
          PAYLOAD=$(jq -nc \
            --arg version "$VERSION" \
            --arg cdnBase "$CDN_BASE" \
            --arg manifestUrl "$MANIFEST_URL" \
            '{
              event_type: "release-published",
              client_payload: (
                {version: $version}
                + (if $cdnBase != "" then {cdnBase: $cdnBase} else {} end)
                + (if $manifestUrl != "" then {manifestUrl: $manifestUrl} else {} end)
              )
            }')
          curl -fsS -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${SITE_DEPLOY_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${SITE_REPO}/dispatches" \
            -d "$PAYLOAD"
          echo "Dispatched release-published to ${SITE_REPO} (version=${VERSION} manifestUrl=${MANIFEST_URL:-none})"
